<style>
    /* Slider için özel stil */


    .vip-modal-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        animation: vipFadeIn 0.4s ease;
    }

    .vip-card {
        background: rgba(20, 20, 20, 0.95);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 320px;
        color: white;
        text-align: center;
        font-family: 'Segoe UI', sans-serif;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
    }

    .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 15px 0;
        background: rgba(255, 255, 255, 0.05);
        padding: 12px;
        border-radius: 12px;
    }

    .toggle-switch {
        width: 40px;
        height: 20px;
        background: #333;
        border-radius: 20px;
        position: relative;
        cursor: pointer;
        transition: 0.3s;
    }

    .toggle-switchsex {
        background: #333;
        padding: 10px;
        border-radius: 20px;

    }


    .toggle-switch.on {
        background: #00d2ff;
    }

    .toggle-switch::after {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        background: white;
        border-radius: 50%;
        top: 2px;
        left: 2px;
        transition: 0.3s;
    }

    .toggle-switch.on::after {
        left: 22px;
    }

    .task-item {
        text-align: left;
        font-size: 13px;
        color: #ddd;
        margin-bottom: 10px;
    }

    .progress-bar-bg {
        background: #000000;
        height: 10px;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 5px;
    }

    .progress-bar-fill {
        height: 100%;
        background: #00d2ff;
        transition: width 0.3s ease;
    }

    .percent-input {
        width: 45px;
        background: #222;
        border: 1px solid #444;
        color: #fff;
        border-radius: 4px;
        text-align: center;
    }

    @keyframes vipFadeIn {
        from {
            opacity: 0;
            transform: scale(0.9);
        }

        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    .progress-bar-bg {
        height: 10px;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 5px;
        cursor: pointer;
        position: relative;
    }

    .progress-bar-fill {
        height: 100%;
        background: #00d2ff;
        transition: width 0.1s ease;
        pointer-events: none;
    }
</style>
<style>
    /* CSS stillerini buraya koru, ek olarak sürükleme için şu küçük dokunuşu ekle */
    .progress-bar-bg {
        cursor: pointer;
        user-select: none;
    }
</style>

<div id="${MODAL_ID}" class="vip-modal-backdrop">
    <div class="vip-card">
        <h2 style="margin: 0 0 20px 0; letter-spacing: 2px; color: #00d2ff;">Panel</h2>
        <div class="toggle-row">
            <span>PD Kit</span>
            <div class="toggle-switch" data-setting="PDKit" onclick="toggleSetting(this)"></div>
        </div>

        <div class="toggle-row">
            <span>Shotfire CCTV</span>
            <div class="toggle-switch" data-setting="ShotfireCCTV" onclick="toggleSetting(this)"></div>
        </div>

        <div class="toggle-switchsex">
            <div class="toggle-row">
                <span>FAST UI</span>
                <div class="toggle-switch" data-setting="fastui" onclick="toggleSetting(this)"></div>
            </div>

            <div style="margin-bottom:15px; display:flex; gap:5px;">
                <input type="text" id="new-task-title" placeholder="Başlık"
                    style="flex:1; background:#222; border:1px solid #444; color:#fff; padding:5px;">
                <button onclick="addNewTask()"
                    style="background:#00d2ff; border:none; cursor:pointer; padding:0 10px;">+</button>
            </div>

            <div id="task-container" style="display: flex; flex-direction: column;"></div>
        </div>

        <button onclick="document.getElementById('${MODAL_ID}').remove()"
            style="margin-top: 20px; padding: 10px 30px; background: transparent; border: 1px solid #ff4444; color: #ff4444; border-radius: 8px; cursor: pointer; width: 100%;">Kapat</button>
    </div>
</div>

<script>
    let tasks = [];

    // 1. Sayfa yüklendiğinde JSON verilerini çek
    async function initData() {
        try {
            const response = await fetch('/get-data');
            const data = await response.json();
            // Backend'den hem toggles hem de tasks dönecek şekilde düzenlendi
            tasks = data.tasks || [];

            // Toggle durumlarını ayarla
            if (data.toggles) {
                Object.keys(data.toggles).forEach(key => {
                    const el = document.querySelector(`[data-setting="${key}"]`);
                    if (el && data.toggles[key]) el.classList.add('on');
                });
            }
            renderTasks();
        } catch (e) {
            console.error("Veri çekilemedi:", e);
        }
    }

    // 2. Yeni Görev Ekleme
    async function addNewTask() {
        const titleInput = document.getElementById('new-task-title');
        if (!titleInput.value) return;

        const newTask = { title: titleInput.value, percent: 0 };
        tasks.push(newTask);
        renderTasks();

        // Backend'e kaydet
        await fetch('/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newTask)
        });

        titleInput.value = '';
    }

    // 3. Render Fonksiyonu
    function renderTasks() {
        const container = document.getElementById('task-container');
        container.innerHTML = tasks.map((t, i) => `
            <div class="task-item" id="task-${i}">
                <div style="display: flex; justify-content: space-between;">
                    <span>${t.title}</span>
                    <span id="text-${i}">${t.percent}%</span>
                </div>
                <div class="progress-bar-bg" onmousedown="startDrag(event, ${i})">
                    <div class="progress-bar-fill" id="fill-${i}" style="width: ${t.percent}%"></div>
                </div>
            </div>
        `).join('');
    }

    // 4. Gelişmiş Sürükleme (Drag) Sistemi
    let isDragging = false;
    let saveTimeout = null;

    function startDrag(event, id) {
        isDragging = true;
        updateProgress(event, id);

        const onMove = (e) => { if (isDragging) updateProgress(e, id); };
        const onUp = () => {
            isDragging = false;
            document.removeEventListener("mousemove", onMove);
            document.removeEventListener("mouseup", onUp);
            sendProgress(id); // Bıraktığında kesin kaydet
        };

        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
    }

    function updateProgress(event, id) {
        const bar = document.querySelector(`#task-${id} .progress-bar-bg`);
        const rect = bar.getBoundingClientRect();
        let percent = Math.round(((event.clientX - rect.left) / rect.width) * 100);
        percent = Math.max(0, Math.min(100, percent));

        tasks[id].percent = percent;
        document.getElementById(`fill-${id}`).style.width = percent + "%";
        document.getElementById(`text-${id}`).innerText = percent + "%";

        // İsteği limitle (Debounce)
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => sendProgress(id), 50);
    }

    // 5. Backend Senkronizasyonu
    async function sendProgress(id) {
        try {
            await fetch("/settings", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    title: tasks[id].title,
                    percent: tasks[id].percent
                })
            });
        } catch (e) { console.error("Kayıt hatası:", e); }
    }

    async function toggleSetting(el) {
        el.classList.toggle('on');
        await fetch('/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                setting: el.getAttribute('data-setting'),
                value: el.classList.contains('on')
            })
        });
    }

    // Başlat
    initData();
</script>
