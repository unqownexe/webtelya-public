<style>
    /* Tam Ekran Cyber-SASP Komuta Merkezi */
    .vip-modal-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(6, 9, 16, 0.85);
        backdrop-filter: blur(20px) saturate(200%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        animation: vipFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        padding: 40px;
        box-sizing: border-box;
    }

    .vip-card {
        background: linear-gradient(160deg, rgba(15, 22, 36, 0.9), rgba(8, 12, 21, 0.98));
        padding: 35px;
        border-radius: 28px;
        border: 1px solid rgba(0, 210, 255, 0.15);
        width: 100%;
        height: 100%;
        /* Tam Ekran sığdırma */
        color: #f3f4f6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-shadow:
            0 0 80px rgba(0, 0, 0, 0.8),
            0 0 40px rgba(0, 210, 255, 0.05),
            inset 0 1px 2px rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(30px);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
    }

    /* Üst Bar */
    .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding-bottom: 20px;
        margin-bottom: 25px;
        flex-shrink: 0;
    }

    /* Mesai (Duty) Butonu Stili */
    .duty-btn {
        background: linear-gradient(135deg, rgba(235, 94, 40, 0.2), rgba(244, 63, 94, 0.2));
        border: 1px solid rgba(244, 63, 94, 0.4);
        color: #f43f5e;
        padding: 10px 20px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 15px rgba(244, 63, 94, 0.1);
    }

    .duty-btn.active {
        background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.2));
        border-color: rgba(16, 185, 129, 0.5);
        color: #10b981;
        box-shadow: 0 4px 15px rgba(16, 185, 129, 0.15);
    }

    .duty-btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.2);
    }

    /* 3 Kolonlu Tam Boy Grid */
    .panel-grid-container {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 25px;
        align-items: stretch;
        flex-grow: 1;
        /* Kalan boşluğu kaplasın */
        min-height: 0;
        /* Overflow çocukların çalışması için şart */
    }

    .panel-column {
        display: flex;
        flex-direction: column;
        gap: 15px;
        height: 100%;
        min-height: 0;
    }

    /* Bölüm Kartları İçeriği */
    .toggle-switchsex {
        background: rgba(5, 8, 15, 0.4);
        padding: 24px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.03);
        height: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.02);
        padding: 16px 20px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.01);
        transition: all 0.25s ease;
    }

    .toggle-row:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(0, 210, 255, 0.1);
    }

    /* Switch Çekirdeği */
    .toggle-switch {
        width: 46px;
        height: 26px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        position: relative;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toggle-switch.on {
        background: #00d2ff;
        box-shadow: 0 0 14px rgba(0, 210, 255, 0.3);
    }

    .toggle-switch::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        background: #fff;
        border-radius: 50%;
        top: 3px;
        left: 3px;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toggle-switch.on::after {
        left: 23px;
        background: #090f1a;
    }

    /* Listeler Alanı ve Özel Scrollbar Pro */
    #task-container {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        overflow-y: auto;
        padding-right: 8px;
        gap: 4px;
    }

    ::-webkit-scrollbar {
        width: 6px;
    }

    ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
        background: rgba(0, 210, 255, 0.2);
        border-radius: 10px;
        border: 1px solid rgba(0, 210, 255, 0.1);
    }

    ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 210, 255, 0.4);
    }

    /* Progres Sliider Alanları */
    .task-item {
        background: rgba(255, 255, 255, 0.01);
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.01);
        margin-bottom: 4px;
    }

    .progress-bar-bg {
        background: rgba(0, 0, 0, 0.6);
        height: 10px;
        border-radius: 6px;
        overflow: hidden;
        margin-top: 8px;
        cursor: pointer;
        user-select: none;
    }

    .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #00d2ff, #0066ff);
    }

    /* Input & Renk Paleti */
    #gps-name-input,
    #new-task-title {
        width: 100%;
        background: rgba(10, 15, 26, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: #fff;
        padding: 12px 14px;
        border-radius: 12px;
        box-sizing: border-box;
        outline: none;
        font-size: 13px;
    }

    #gps-name-input:focus,
    #new-task-title:focus {
        border-color: #00d2ff;
    }

    .gps_color_button {
        width: 24px !important;
        height: 24px !important;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.2s;
        border: 2px solid transparent !important;
    }

    .gps_color_button.active {
        border: 2px solid #fff !important;
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
    }

    #gps-save-btn,
    .add-task-btn {
        background: linear-gradient(135deg, #00d2ff, #00a2ff);
        border: none;
        color: #050b14;
        font-weight: 600;
        cursor: pointer;
    }

    #gps-save-btn {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        margin-top: auto;
    }

    .add-task-btn {
        padding: 0 18px;
        border-radius: 12px;
        font-weight: bold;
    }

    .close-panel-btn {
        margin-top: 25px;
        padding: 14px;
        background: rgba(239, 68, 68, 0.04);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #ef4444;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        flex-shrink: 0;
    }

    .close-panel-btn:hover {
        background: rgba(239, 68, 68, 0.1);
        border-color: #ef4444;
    }

    @keyframes vipFadeIn {
        from {
            opacity: 0;
            transform: scale(0.99);
        }

        to {
            opacity: 1;
            transform: scale(1);
        }
    }
</style>

<div id="${MODAL_ID}" class="vip-modal-backdrop">
    <div class="vip-card">

        <div class="panel-header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button id="duty-toggle-btn" class="duty-btn" onclick="window.open('/duty', '_blank')">
                    <span style="width: 8px; height: 8px; background: currentColor; border-radius: 50%;"></span>
                    <span id="duty-text">Mesaidekiler</span>
                </button>
                <h2
                    style="margin: 0; font-size: 1.5rem; font-weight: 800; letter-spacing: 3px; color: #00d2ff; text-transform: uppercase;">
                    UI Ayarları</h2>
            </div>
            <span
                style="font-size: 12px; background: rgba(0, 210, 255, 0.08); color: #00d2ff; padding: 6px 14px; border-radius: 30px; font-weight: 700; border: 1px solid rgba(0, 210, 255, 0.15);">Unqown
                Exe</span>
        </div>

        <div class="panel-grid-container">

            <div class="panel-column">
                <div
                    style="font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.3); margin-bottom: 2px;">
                    Ana Modüller</div>
                <div class="toggle-row">
                    <span>FPS Boost</span>
                    <div class="toggle-switch" data-setting="FPSBoost" onclick="toggleSetting(this)"></div>
                </div>
                <div class="toggle-row">
                    <span>Otomatik PD Kit</span>
                    <div class="toggle-switch" data-setting="PDKit" onclick="toggleSetting(this)"></div>
                </div>
                <div class="toggle-row">
                    <span>Shotfire CCTV</span>
                    <div class="toggle-switch" data-setting="ShotfireCCTV" onclick="toggleSetting(this)"></div>
                </div>
            </div>

            <div class="panel-column">
                <div class="toggle-switchsex">
                    <div class="toggle-row"
                        style="margin-top:0; background:transparent; padding:0; border:none; margin-bottom:15px;">
                        <span style="font-weight:700; font-size:14px; color:#00d2ff;">Fast GPS</span>
                        <div class="toggle-switch" data-setting="FastGPS" onclick="toggleSetting(this)"></div>
                    </div>

                    <div style="margin-bottom: 14px;">
                        <input type="text" id="gps-name-input" placeholder="Çağrı Kodunu Belirleyin...">
                    </div>

                    <div class="gps_menu_color_list"
                        style="display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 20px; justify-content: center;">
                        <div class="gps_color_button" id="0" style="background: rgb(255, 255, 255);"></div>
                        <div class="gps_color_button" id="46" style="background: rgb(236, 240, 41);"></div>
                        <div class="gps_color_button" id="1" style="background: rgb(224, 50, 50);"></div>
                        <div class="gps_color_button" id="2" style="background: rgb(113, 203, 113);"></div>
                        <div class="gps_color_button" id="3" style="background: rgb(93, 182, 229);"></div>
                        <div class="gps_color_button" id="7" style="background: rgb(156, 110, 175);"></div>
                        <div class="gps_color_button" id="47" style="background: rgb(255, 154, 24);"></div>
                        <div class="gps_color_button" id="52" style="background: rgb(0, 100, 0);"></div>
                        <div class="gps_color_button active" id="53" style="background: rgb(173, 216, 230);"></div>
                        <div class="gps_color_button" id="55" style="background: rgb(64, 64, 64);"></div>
                        <div class="gps_color_button" id="56" style="background: rgb(139, 69, 19);"></div>
                    </div>

                    <button id="gps-save-btn" onclick="saveGPSConfig()">Kaydet</button>
                </div>
            </div>

            <div class="panel-column">
                <div class="toggle-switchsex">
                    <div class="toggle-row"
                        style="margin-top:0; background:transparent; padding:0; border:none; margin-bottom:15px;">
                        <span style="font-weight:700; font-size:14px; color:#00d2ff;">Arayüz Görev İzleyici</span>
                        <div class="toggle-switch" data-setting="fastui" onclick="toggleSetting(this)"></div>
                    </div>

                    <div style="margin-bottom: 15px; display: flex; gap: 8px; flex-shrink: 0;">
                        <input type="text" id="new-task-title" placeholder="Yeni metrik/görev ekle...">
                        <button class="add-task-btn" onclick="addNewTask()">+</button>
                    </div>

                    <div id="task-container"></div>
                </div>
            </div>

        </div>

    </div>

    <div id="restart-notify"
        style="display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 16px 32px; border-radius: 16px; cursor: pointer; z-index: 10000; box-shadow: 0 15px 30px rgba(239, 68, 68, 0.4); font-weight: 700; font-size: 13px; transition: all 0.3s;"
        onclick="restartScripts()">
        Değişiklikleri Senkronize Et (Yeniden Başlat)
    </div>
</div>

<script>
    let tasks = [];
    let isDuty = false;

    // MESAİ TUŞU FONKSİYONU (/duty yönlendirmesi)
    async function toggleDuty() {
        const btn = document.getElementById('duty-toggle-btn');
        const txt = document.getElementById('duty-text');

        try {
            const response = await fetch('/duty', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: !isDuty })
            });

            // İstek başarılı olduysa durumu güncelle
            isDuty = !isDuty;
            if (isDuty) {
                btn.classList.add('active');
                txt.innerText = "Mesai Aktif";
            } else {
                btn.classList.remove('active');
                txt.innerText = "Mesai Dışı";
            }
        } catch (e) {
            console.error("Mesai durum hatası:", e);
            // Sunucu entegrasyonu yoksa bile görsel simülasyon testi için:
            isDuty = !isDuty;
            btn.classList.toggle('active', isDuty);
            txt.innerText = isDuty ? "Mesai Aktif" : "Mesai Dışı";
        }
    }

    function showRestartNotify() {
        document.getElementById('restart-notify').style.display = 'block';
    }

    async function restartScripts() {
        const notify = document.getElementById('restart-notify');
        notify.innerText = "Sistemler Yeniden Başlatılıyor...";
        notify.style.background = "#f59e0b";

        try {
            const response = await fetch('/restart-scripts', { method: 'POST' });
            if (response.ok) {
                notify.innerText = "Başarıyla Yeniden Başlatıldı!";
                notify.style.background = "#10b981";
                setTimeout(() => {
                    notify.style.display = 'none';
                    notify.innerText = "Değişiklikleri Senkronize Et (Yeniden Başlat)";
                    notify.style.background = "#ef4444";
                }, 2000);
            } else { throw new Error(); }
        } catch (e) {
            notify.innerText = "Hata Meydana Geldi!";
            setTimeout(() => {
                notify.innerText = "Değişiklikleri Senkronize Et (Yeniden Başlat)";
                notify.style.background = "#ef4444";
            }, 2000);
        }
    }

    async function initData() {
        try {
            const response = await fetch('/get-data');
            const data = await response.json();
            tasks = data.tasks || [];

            if (data.toggles) {
                Object.keys(data.toggles).forEach(key => {
                    const el = document.querySelector(`[data-setting="${key}"]`);
                    if (el && data.toggles[key]) el.classList.add('on');
                });
            }

            if (data.gpsConfig) {
                document.getElementById('gps-name-input').value = data.gpsConfig.name || '';
                const savedColor = (data.gpsConfig.color || 'rgb(173, 216, 230)').replace(/\s+/g, '');

                document.querySelectorAll('.gps_color_button').forEach(btn => {
                    const btnBg = (btn.style.backgroundColor || btn.style.background || '').replace(/\s+/g, '');
                    if (btnBg.includes(savedColor) || savedColor.includes(btnBg)) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
            renderTasks();
        } catch (e) { console.error("Veri hatası:", e); }
    }

    async function addNewTask() {
        const titleInput = document.getElementById('new-task-title');
        if (!titleInput.value) return;

        const newTask = { title: titleInput.value, percent: 0 };
        tasks.push(newTask);
        renderTasks();

        await fetch('/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newTask)
        });

        showRestartNotify();
        titleInput.value = '';
    }

    function renderTasks() {
        const container = document.getElementById('task-container');
        container.innerHTML = tasks.map((t, i) => `
            <div class="task-item" id="task-${i}">
                <div style="display: flex; justify-content: space-between;">
                    <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;">${t.title}</span>
                    <span id="text-${i}" style="color: #00d2ff; font-weight: 700;">${t.percent}%</span>
                </div>
                <div class="progress-bar-bg" onmousedown="startDrag(event, ${i})">
                    <div class="progress-bar-fill" id="fill-${i}" style="width: ${t.percent}%"></div>
                </div>
            </div>
        `).join('');
    }

    let isDragging = false;
    let saveTimeout = null;

    function startDrag(event, id) {
        isDragging = true;
        updateProgress(event, id);

        const onMove = (e) => { if (isDragging) updateProgress(e, id); };
        const onUp = () => {
            isDragging = false;
            document.removeEventListener("mousemove", onMove);
            document.removeEventListener("mouseup", onUp);
            sendProgress(id);
        };

        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
    }

    function updateProgress(event, id) {
        const bar = document.querySelector(`#task-${id} .progress-bar-bg`);
        const rect = bar.getBoundingClientRect();
        let percent = Math.round(((event.clientX - rect.left) / rect.width) * 100);
        percent = Math.max(0, Math.min(100, percent));

        tasks[id].percent = percent;
        document.getElementById(`fill-${id}`).style.width = percent + "%";
        document.getElementById(`text-${id}`).innerText = percent + "%";

        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => sendProgress(id), 50);
    }

    async function sendProgress(id) {
        try {
            await fetch("/settings", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title: tasks[id].title, percent: tasks[id].percent })
            });
        } catch (e) { console.error(e); }
    }

    async function toggleSetting(el) {
        el.classList.toggle('on');
        await fetch('/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                setting: el.getAttribute('data-setting'),
                value: el.classList.contains('on')
            })
        });
        showRestartNotify();
    }

    document.querySelectorAll('.gps_color_button').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.gps_color_button').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
        });
    });

    async function saveGPSConfig() {
        const name = document.getElementById('gps-name-input').value;
        const activeBtn = document.querySelector('.gps_color_button.active');
        const color = activeBtn ? activeBtn.id : '53';

        await fetch('/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ gpsConfig: { name, color } })
        });

        showRestartNotify();

        const btn = document.getElementById('gps-save-btn');
        btn.innerText = "Veri Merkezine İletildi!";
        btn.style.background = "linear-gradient(135deg, #10b981, #059669)";
        setTimeout(() => {
            btn.innerText = "GPS Sunucusuna Gönder";
            btn.style.background = "linear-gradient(135deg, #00d2ff, #00a2ff)";
        }, 1500);
    }

    initData();
</script>
