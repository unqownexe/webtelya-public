<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP Personel Durum Paneli - Executive Edition</title>
    <style>
        :root {
            /* Ultra-Premium Cyber Slate Renk Paleti */
            --bg-color: #0b0f19;
            --board-bg: rgba(17, 24, 39, 0.45);
            --card-bg: rgba(31, 41, 55, 0.55);
            --card-hover: rgba(38, 51, 70, 0.75);
            --border-color: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(255, 255, 255, 0.12);

            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --text-dark: #4b5563;

            /* Premium Durum Renkleri - HSL Neon Dengesi */
            --status-1: #10b981;
            /* Telsizde */
            --status-1-glow: rgba(16, 185, 129, 0.25);
            --status-2: #3b82f6;
            /* Mesaide */
            --status-2-glow: rgba(59, 130, 246, 0.25);
            --status-3: #f59e0b;
            /* Mesai Kapalı */
            --status-3-glow: rgba(245, 158, 11, 0.25);
            --status-4: #ef4444;
            /* Çevrimdışı */
            --status-4-glow: rgba(239, 68, 68, 0.15);

            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --transition-main: all 0.35s var(--ease-out-expo);
        }

        @keyframes premiumEntrance {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulseRadar {

            0%,
            100% {
                transform: scale(0.9);
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }

            50% {
                transform: scale(1.1);
                opacity: 0.6;
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }
        }

        @keyframes borderGlow {

            0%,
            100% {
                border-color: var(--border-color);
            }

            50% {
                border-color: rgba(255, 255, 255, 0.1);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.03) 0, transparent 40%),
                radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.05) 0, transparent 45%),
                radial-gradient(at 50% 100%, rgba(17, 24, 39, 0.8) 0, transparent 70%);
            background-attachment: fixed;
            overflow: hidden;
        }

        /* Üst Bar */
        .header-section {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        .brand-area h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 60%, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Canlı İlerleme Çubuğu & Sayaç */
        .sync-status {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            min-width: 150px;
        }

        .progress-bar-container {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--status-2), var(--status-1));
            transition: width 1s linear;
        }

        /* Filtre Paneli */
        .filter-controls {
            display: flex;
            gap: 0.75rem;
        }

        .filter-controls input,
        .filter-controls select {
            background: rgba(17, 24, 39, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.65rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            outline: none;
            transition: var(--transition-main);
            backdrop-filter: blur(12px);
        }

        .filter-controls input::placeholder {
            color: var(--text-dark);
        }

        .filter-controls input:hover,
        .filter-controls select:hover {
            border-color: var(--border-hover);
            background: rgba(17, 24, 39, 0.8);
        }

        .filter-controls input:focus,
        .filter-controls select:focus {
            border-color: rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15), 0 0 20px rgba(59, 130, 246, 0.1);
        }

        /* Board Düzeni */
        .board-container {
            display: flex;
            gap: 1.5rem;
            flex-grow: 1;
            overflow-x: auto;
            padding-bottom: 1rem;
        }

        /* Kolonlar */
        .status-column {
            background: var(--board-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            min-width: 320px;
            flex: 1;
            display: flex;
            flex-direction: column;
            max-height: 100%;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            animation: borderGlow 8s infinite ease-in-out;
        }

        .column-header {
            padding: 1.25rem 1.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Özel Kolon Neon Sınırları */
        #col-1 {
            border-top: 3px solid var(--status-1);
            box-shadow: inset 0 4px 20px -5px var(--status-1-glow);
        }

        #col-2 {
            border-top: 3px solid var(--status-2);
            box-shadow: inset 0 4px 20px -5px var(--status-2-glow);
        }

        #col-3 {
            border-top: 3px solid var(--status-3);
            box-shadow: inset 0 4px 20px -5px var(--status-3-glow);
        }

        #col-4 {
            border-top: 3px solid var(--status-4);
            box-shadow: inset 0 4px 20px -5px var(--status-4-glow);
        }

        .count-badge {
            background: rgba(255, 255, 255, 0.04);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #col-1 .count-badge {
            color: var(--status-1);
            background: rgba(16, 185, 129, 0.1);
        }

        #col-2 .count-badge {
            color: var(--status-2);
            background: rgba(59, 130, 246, 0.1);
        }

        #col-3 .count-badge {
            color: var(--status-3);
            background: rgba(245, 158, 11, 0.1);
        }

        #col-4 .count-badge {
            color: var(--status-4);
            background: rgba(239, 68, 68, 0.1);
        }

        .column-content {
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: calc(100vh - 230px);
        }

        /* Premium Personel Kartı */
        .personnel-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            position: relative;
            backdrop-filter: blur(8px);
            animation: premiumEntrance 0.4s var(--ease-out-expo) forwards;
        }

        .personnel-card:hover {
            transform: translateY(-3px) scale(1.01);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow:
                0 15px 30px -10px rgba(0, 0, 0, 0.6),
                0 0 1px 1px rgba(255, 255, 255, 0.1) inset;
        }

        /* Hover Durum Işıkları (Neon Kenarlık) */
        .personnel-card.state-1:hover {
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 10px 25px -5px var(--status-1-glow);
        }

        .personnel-card.state-2:hover {
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 10px 25px -5px var(--status-2-glow);
        }

        .personnel-card.state-3:hover {
            border-color: rgba(245, 158, 11, 0.4);
            box-shadow: 0 10px 25px -5px var(--status-3-glow);
        }

        .personnel-card.state-4:hover {
            border-color: rgba(239, 68, 68, 0.3);
            box-shadow: 0 10px 25px -5px var(--status-4-glow);
        }

        /* Avatar Alanı */
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s var(--ease-out-expo);
        }

        .personnel-card:hover .avatar img {
            transform: scale(1.12);
        }

        /* Kart İçerik Detayları */
        .info {
            flex-grow: 1;
            min-width: 0;
        }

        .name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.3rem;
            gap: 0.5rem;
        }

        .name-row h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .citizen-id {
            color: var(--text-muted);
            font-size: 0.65rem;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 6px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .job-details {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .boss-star {
            color: #fbbf24;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.6);
        }

        /* Telsiz Bilgisi Modülü */
        .radio-info {
            font-size: 0.75rem;
            color: var(--status-1);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.08);
            padding: 3px 8px;
            border-radius: 6px;
            margin-top: 0.5rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
            backdrop-filter: blur(4px);
        }

        .radio-info::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--status-1);
            border-radius: 50%;
            animation: pulseRadar 1.8s infinite ease-in-out;
        }

        .hidden {
            display: none !important;
        }

        /* Modern Kusursuz Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.12);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.25);
        }

        /* Staggered (Kademeli) Giriş Senkronizasyonu */
        .personnel-card:nth-child(1) {
            animation-delay: 0.03s;
        }

        .personnel-card:nth-child(2) {
            animation-delay: 0.06s;
        }

        .personnel-card:nth-child(3) {
            animation-delay: 0.09s;
        }

        .personnel-card:nth-child(4) {
            animation-delay: 0.12s;
        }

        .personnel-card:nth-child(5) {
            animation-delay: 0.15s;
        }
    </style>
</head>

<body>

    <div class="header-section">
        <div class="brand-area">
            <h1>SASP Aktiflik Panosu</h1>
        </div>

        <div class="filter-controls">
            <input type="text" id="searchInput" placeholder="İsim veya ID ara...">
            <select id="statusFilter">
                <option value="all">Tüm Durumlar</option>
                <option value="state-1">Oyunda, Mesai Aktif & Telsizde</option>
                <option value="state-2">Oyunda, Mesai Aktif</option>
                <option value="state-3">Oyunda, Mesai Kapalı</option>
                <option value="state-4">Çevrimdışı</option>
            </select>
        </div>

        <div class="sync-status">
            <div style="display: flex; justify-content: space-between;">
                <span>Eşitleme Döngüsü</span>
                <span id="next-update">30s</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="sync-progress"></div>
            </div>
        </div>
    </div>

    <div class="board-container">
        <div class="status-column" id="col-1">
            <div class="column-header">
                Telsizde <span class="count-badge" id="count-1">0</span>
            </div>
            <div class="column-content" id="list-1"></div>
        </div>

        <div class="status-column" id="col-2">
            <div class="column-header">
                Mesaide <span class="count-badge" id="count-2">0</span>
            </div>
            <div class="column-content" id="list-2"></div>
        </div>

        <div class="status-column" id="col-3">
            <div class="column-header">
                Mesai Kapalı <span class="count-badge" id="count-3">0</span>
            </div>
            <div class="column-content" id="list-3"></div>
        </div>

        <div class="status-column" id="col-4">
            <div class="column-header">
                Çevrimdışı <span class="count-badge" id="count-4">0</span>
            </div>
            <div class="column-content" id="list-4"></div>
        </div>
    </div>

    <script>
        const rankNames = {
            0: "Trainee Officer", 1: "Officer 1", 2: "Officer 2", 3: "Officer 3",
            4: "Officer 3+1", 5: "Detective 1", 6: "Detective 2", 7: "Detective 3",
            8: "Sergeant 1", 9: "Sergeant 2", 10: "Lieutenant 1", 11: "Captain"
        };

        let serverData = { telsizData: {}, dutyData: [] };
        let radioUsers = [];

        async function fetchDutyData() {
            try {
                const res = await fetch("http://localhost:3000/dutyData");
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                serverData = await res.json();
                radioUsers = Object.values(serverData.telsizData || {});

                renderBoard();
                filterCards();
            } catch (err) {
                console.error("Veri senkronizasyon hatası:", err);
            }
        }

        function renderBoard() {
            const lists = {
                1: document.getElementById('list-1'),
                2: document.getElementById('list-2'),
                3: document.getElementById('list-3'),
                4: document.getElementById('list-4')
            };

            for (let i = 1; i <= 4; i++) lists[i].innerHTML = '';

            (serverData.dutyData || []).forEach(emp => {
                const radioInfo = radioUsers.find(r => r.citizenid === emp.identifier);
                const isOnline = (emp.online !== undefined) || !!radioInfo;
                const isOnDuty = emp.job.on_duty;
                const isOnRadio = !!radioInfo;

                let state = 4;
                if (isOnline && isOnDuty && isOnRadio) state = 1;
                else if (isOnline && isOnDuty && !isOnRadio) state = 2;
                else if (isOnline && !isOnDuty) state = 3;

                let avatarHtml = `<div class="avatar">${emp.firstname.charAt(0)}${emp.lastname.charAt(0)}</div>`;
                if (emp.picture) {
                    avatarHtml = `<div class="avatar" style="${state === 4 ? 'filter: grayscale(100%) opacity(0.5);' : ''}"><img src="${emp.picture}" alt="Avatar"></div>`;
                }

                const rankName = rankNames[emp.job.grade_level] || "Bilinmeyen Rütbe";
                const fullName = `${emp.firstname} ${emp.lastname}`;

                const cardHtml = `
                    <div class="personnel-card state-${state}" data-name="${fullName.toLowerCase()}" data-id="${emp.identifier.toLowerCase()}" data-state="state-${state}">
                        ${avatarHtml}
                        <div class="info">
                            <div class="name-row">
                                <h2>${fullName}</h2>
                                <span class="citizen-id">${emp.identifier}</span>
                            </div>
                            <div class="job-details">
                                ${rankName} ${emp.job.is_boss ? '<span class="boss-star">★</span>' : ''}
                            </div>
                            ${state === 1 ? `<div class="radio-info">📻 ${radioInfo.prefix} - ${radioInfo.name}</div>` : ''}
                        </div>
                    </div>
                `;

                lists[state].insertAdjacentHTML('beforeend', cardHtml);
            });

            updateCounts();
        }

        function updateCounts() {
            for (let i = 1; i <= 4; i++) {
                const visibleCount = document.querySelectorAll(`#list-${i} .personnel-card:not(.hidden)`).length;
                document.getElementById(`count-${i}`).textContent = visibleCount;
            }
        }

        function filterCards() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;

            document.querySelectorAll('.personnel-card').forEach(card => {
                const name = card.dataset.name;
                const id = card.dataset.id;
                const state = card.dataset.state;

                const matchesSearch = name.includes(searchText) || id.includes(searchText);
                const matchesStatus = statusFilter === 'all' || statusFilter === state;

                card.classList.toggle('hidden', !(matchesSearch && matchesStatus));
            });

            for (let i = 1; i <= 4; i++) {
                const col = document.getElementById(`col-${i}`);
                col.style.display = (statusFilter === 'all' || statusFilter === `state-${i}`) ? 'flex' : 'none';
            }

            updateCounts();
        }

        document.getElementById('searchInput').addEventListener('input', filterCards);
        document.getElementById('statusFilter').addEventListener('change', filterCards);

        // Döngüsel İlerleme Çubuğu ve Geri Sayım Mantığı
        const nextUpdate = document.getElementById("next-update");
        const progressBar = document.getElementById("sync-progress");
        const cycleTime = 30; // saniye
        let remaining = cycleTime;

        async function updateData() {
            remaining = cycleTime;
            progressBar.style.transition = 'none';
            progressBar.style.width = '100%';
            await fetchDutyData();
            setTimeout(() => {
                progressBar.style.transition = `width ${cycleTime}s linear`;
                progressBar.style.width = '0%';
            }, 50);
        }

        // İlk Tetikleme
        updateData();
        setInterval(updateData, cycleTime * 1000);

        setInterval(() => {
            remaining--;
            if (remaining < 0) remaining = cycleTime;
            nextUpdate.textContent = `${remaining}s`;
        }, 1000);
    </script>
</body>

</html>
