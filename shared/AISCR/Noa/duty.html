<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP Personel Durum Paneli</title>
    <style>
        :root {
            /* Premium SaaS Slate Renk Paleti */
            --bg-color: #090d16;
            --board-bg: #111827;
            --card-bg: #1f2937;
            --card-hover: #263346;
            --border-color: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);

            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --text-dark: #6b7280;

            /* Optimize Edilmiş Premium Durum Renkleri (Göz yormayan HSL dengesi) */
            --status-1: #10b981;
            /* Aktif, Telsizde */
            --status-1-rgb: 16, 185, 129;
            --status-2: #3b82f6;
            /* Mesaide */
            --status-3: #f59e0b;
            /* Mesai Kapalı */
            --status-4: #ef4444;
            /* Çevrimdışı */

            /* Akıcı Kübik Eğriler (Donanım Hızlandırmalı Geçişler İçin) */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --transition-main: all 0.25s var(--ease-out-expo);
        }

        /* Sayfa Açılış Efekti (Smooth Fade-in) */
        @keyframes premiumEntrance {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.99);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulseRadar {
            0% {
                transform: scale(0.95);
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5);
            }

            70% {
                transform: scale(1);
                opacity: 0.5;
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }

            100% {
                transform: scale(0.95);
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
            height: 100vh;
            display: flex;
            flex-direction: column;
            /* Derinlik katan çok hafif bir mesh gradient background */
            background-image:
                radial-gradient(at 0% 0%, rgba(31, 41, 55, 0.3) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(17, 24, 39, 0.5) 0, transparent 50%);
            background-attachment: fixed;
            overflow: hidden;
        }

        /* Üst Bar Tasarımı */
        .header-section {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.25rem;
        }

        .header-section h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--text-main);
        }

        /* Filtre Elemanları - İnteraktif ve Keskin */
        .filter-controls {
            display: flex;
            gap: 0.75rem;
        }

        .filter-controls input,
        .filter-controls select {
            background-color: rgba(17, 24, 39, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.55rem 0.9rem;
            border-radius: 6px;
            font-size: 0.875rem;
            outline: none;
            transition: var(--transition-main);
            backdrop-filter: blur(4px);
        }

        .filter-controls input::placeholder {
            color: var(--text-dark);
        }

        .filter-controls input:hover,
        .filter-controls select:hover {
            border-color: var(--border-hover);
            background-color: rgba(17, 24, 39, 0.9);
        }

        .filter-controls input:focus,
        .filter-controls select:focus {
            border-color: var(--status-2);
            background-color: var(--board-bg);
            box-shadow: 0 0 0 1px var(--status-2), 0 0 12px rgba(59, 130, 246, 0.15);
        }

        /* Kanban Board Container */
        .board-container {
            display: flex;
            gap: 1.5rem;
            flex-grow: 1;
            overflow-x: auto;
            padding-bottom: 1rem;
            align-items: flex-start;
        }

        /* Kolon Yapısı */
        .status-column {
            background-color: var(--board-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            min-width: 310px;
            flex: 1;
            display: flex;
            flex-direction: column;
            max-height: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }

        .column-header {
            padding: 1.1rem 1.25rem;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Sayıcı Rozetler (Badge) */
        .count-badge {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            padding: 0.15rem 0.55rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Kurumsal Sol Şerit Efektleri */
        #col-1 {
            border-top: 3px solid var(--status-1);
        }

        #col-2 {
            border-top: 3px solid var(--status-2);
        }

        #col-3 {
            border-top: 3px solid var(--status-3);
        }

        #col-4 {
            border-top: 3px solid var(--status-4);
        }

        .column-content {
            padding: 0.85rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            max-height: calc(100vh - 220px);
        }

        /* Premium Personel Kartı */
        .personnel-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.9rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.9rem;
            cursor: pointer;
            position: relative;

            /* Donanım ivmeli akıcılık ve giriş animasyonu */
            will-change: transform, box-shadow, border-color;
            transition: var(--transition-main);
            animation: premiumEntrance 0.35s var(--ease-out-expo) forwards;
        }

        /* Profesyonel Katmanlı Hover Etkisi */
        .personnel-card:hover {
            transform: translateY(-2px);
            background-color: var(--card-hover);
            border-color: var(--border-hover);
            /* Multi-layered SaaS gölgesi */
            box-shadow:
                0 1px 1px rgba(0, 0, 0, 0.1),
                0 4px 12px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        /* Avatar Alanı - Modern Köşeli Squircle */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s var(--ease-out-expo);
        }

        .personnel-card:hover .avatar img {
            transform: scale(1.08);
        }

        /* Bilgi Alanları Tek tıkla hizalama */
        .info {
            flex-grow: 1;
            min-width: 0;
        }

        .name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.25rem;
            gap: 0.5rem;
        }

        .name-row h2 {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Küçük Detay Kimlikleri (ID) */
        .citizen-id {
            color: var(--text-muted);
            font-size: 0.65rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 1px 4px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            flex-shrink: 0;
        }

        .job-details {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Kurumsal Telsiz Bilgisi ve Radar Efekti */
        .radio-info {
            font-size: 0.75rem;
            color: var(--status-1);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.06);
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        /* Telsiz Sinyal Göstergesi (Radar Pulse) */
        .radio-info::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            background-color: var(--status-1);
            border-radius: 50%;
            animation: pulseRadar 2s infinite ease-in-out;
        }

        .hidden {
            display: none !important;
        }

        /* Kusursuz İnce Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.15);
            border-radius: 10px;
            transition: var(--transition-main);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.3);
        }

        /* Kartların Kademeli Giriş Senkronizasyonu (Staggered Animation) */
        .personnel-card:nth-child(1) {
            animation-delay: 0.02s;
        }

        .personnel-card:nth-child(2) {
            animation-delay: 0.04s;
        }

        .personnel-card:nth-child(3) {
            animation-delay: 0.06s;
        }

        .personnel-card:nth-child(4) {
            animation-delay: 0.08s;
        }

        .personnel-card:nth-child(5) {
            animation-delay: 0.1s;
        }

        .personnel-card:nth-child(6) {
            animation-delay: 0.12s;
        }

        .personnel-card:nth-child(7) {
            animation-delay: 0.14s;
        }

        .personnel-card:nth-child(8) {
            animation-delay: 0.16s;
        }

        .personnel-card:nth-child(9) {
            animation-delay: 0.18s;
        }
    </style>
</head>

<body>

    <div class="header-section">
        <h1>SASP Aktiflik Panosu</h1>
        <h2>Sonraki güncelleme: <span id="next-update"></span></h2>
        <div class="filter-controls">

            <input type="text" id="searchInput" placeholder="İsim veya ID ara...">
            <select id="statusFilter">
                <option value="all">Tüm Durumları Göster</option>
                <option value="state-1">Mesaide & Telsizde</option>
                <option value="state-2">Mesaide</option>
                <option value="state-3">Mesai Kapalı</option>
                <option value="state-4">Oyunda Değil</option>
            </select>
        </div>
    </div>

    <div class="board-container">
        <div class="status-column" id="col-1">
            <div class="column-header">
                Telsizde <span class="count-badge" id="count-1">0</span>
            </div>
            <div class="column-content" id="list-1"></div>
        </div>

        <div class="status-column" id="col-2">
            <div class="column-header">
                Mesaide <span class="count-badge" id="count-2">0</span>
            </div>
            <div class="column-content" id="list-2"></div>
        </div>

        <div class="status-column" id="col-3">
            <div class="column-header">
                Mesai Kapalı <span class="count-badge" id="count-3">0</span>
            </div>
            <div class="column-content" id="list-3"></div>
        </div>

        <div class="status-column" id="col-4">
            <div class="column-header">
                Çevrimdışı <span class="count-badge" id="count-4">0</span>
            </div>
            <div class="column-content" id="list-4"></div>
        </div>
    </div>

    <script>
        const rankNames = {
            0: "Trainee Officer",
            1: "Officer 1",
            2: "Officer 2",
            3: "Officer 3",
            4: "Officer 3+1",
            5: "Detective 1",
            6: "Detective 2",
            7: "Detective 3",
            8: "Sergeant 1",
            9: "Sergeant 2",
            10: "Lieutenant 1",
            11: "Captain"
        };

        let serverData = {
            telsizData: {},
            dutyData: []
        };

        let radioUsers = [];
        let allCards = [];

        async function fetchDutyData() {
            try {
                const res = await fetch("http://localhost:3000/dutyData");

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                serverData = await res.json();
                radioUsers = Object.values(serverData.telsizData || {});

                renderBoard();
                filterCards(); // Filtre uygulanmışsa koru
            } catch (err) {
                console.error("Duty verisi alınamadı:", err);
            }
        }

        function renderBoard() {
            const lists = {
                1: document.getElementById('list-1'),
                2: document.getElementById('list-2'),
                3: document.getElementById('list-3'),
                4: document.getElementById('list-4')
            };

            for (let i = 1; i <= 4; i++) lists[i].innerHTML = '';

            allCards = (serverData.dutyData || []).map(emp => {
                const radioInfo = radioUsers.find(r => r.citizenid === emp.identifier);

                const isOnline = (emp.online !== undefined) || !!radioInfo;
                const isOnDuty = emp.job.on_duty;
                const isOnRadio = !!radioInfo;

                let state = 4;
                if (isOnline && isOnDuty && isOnRadio) state = 1;
                else if (isOnline && isOnDuty && !isOnRadio) state = 2;
                else if (isOnline && !isOnDuty) state = 3;

                let avatarHtml = `<div class="avatar">${emp.firstname.charAt(0)}${emp.lastname.charAt(0)}</div>`;
                if (emp.picture) {
                    avatarHtml = `<div class="avatar" style="${state === 4 ? 'filter: grayscale(100%); opacity: 0.6;' : ''}"><img src="${emp.picture}" alt="Avatar"></div>`;
                }

                const rankName = rankNames[emp.job.grade_level] || "Bilinmeyen Rütbe";
                const fullName = `${emp.firstname} ${emp.lastname}`;

                const cardHtml = `
                <div class="personnel-card state-${state}" data-name="${fullName.toLowerCase()}" data-id="${emp.identifier.toLowerCase()}" data-state="state-${state}">
                    ${avatarHtml}
                    <div class="info">
                        <div class="name-row">
                            <h2>${fullName}</h2>
                            <span class="citizen-id">${emp.identifier}</span>
                        </div>
                        <div class="job-details">
                            ${rankName} ${emp.job.is_boss ? '★' : ''}
                        </div>
                        ${state === 1 ? `<div class="radio-info">📻 ${radioInfo.prefix} - ${radioInfo.name}</div>` : ''}
                    </div>
                </div>
            `;

                lists[state].insertAdjacentHTML('beforeend', cardHtml);

                return { html: cardHtml, state };
            });

            updateCounts();
        }

        function updateCounts() {
            for (let i = 1; i <= 4; i++) {
                const visibleCount = document.querySelectorAll(`#list-${i} .personnel-card:not(.hidden)`).length;
                document.getElementById(`count-${i}`).textContent = visibleCount;
            }
        }

        function filterCards() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;

            const cards = document.querySelectorAll('.personnel-card');

            cards.forEach(card => {
                const name = card.dataset.name;
                const id = card.dataset.id;
                const state = card.dataset.state;

                const matchesSearch = name.includes(searchText) || id.includes(searchText);
                const matchesStatus = statusFilter === 'all' || statusFilter === state;

                card.classList.toggle('hidden', !(matchesSearch && matchesStatus));
            });

            for (let i = 1; i <= 4; i++) {
                const col = document.getElementById(`col-${i}`);
                col.style.display =
                    statusFilter === 'all' || statusFilter === `state-${i}`
                        ? 'flex'
                        : 'none';
            }

            updateCounts();
        }

        document.getElementById('searchInput').addEventListener('input', filterCards);
        document.getElementById('statusFilter').addEventListener('change', filterCards);

        // İlk yükleme
        const nextUpdate = document.getElementById("next-update");

        let remaining = 30;

        async function updateData() {
            remaining = 30;
            await fetchDutyData();
        }

        updateData();

        setInterval(updateData, 30000);

        nextUpdate.textContent = `${remaining} saniye sonra`;

        setInterval(() => {
            remaining--;

            if (remaining < 0) {
                remaining = 30;
            }

            nextUpdate.textContent = `${remaining} saniye sonra`;
        }, 1000);
    </script>
</body>

</html>
